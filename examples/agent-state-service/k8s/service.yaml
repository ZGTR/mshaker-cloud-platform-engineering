apiVersion: v1
kind: Service
metadata:
  name: agent-state
  namespace: agents
  labels:
    app: agent-state
spec:
  type: ClusterIP
  selector:
    app: agent-state
  ports:
    - name: http
      port: 80          # service port (in-cluster: agent-state.agents:80)
      targetPort: 8080  # container port
