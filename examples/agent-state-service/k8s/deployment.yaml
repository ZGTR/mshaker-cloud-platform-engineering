apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-state
  namespace: agents
  labels:
    app: agent-state
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-state
  template:
    metadata:
      labels:
        app: agent-state
    spec:
      containers:
        - name: agent-state
          image: agent-state-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "1.0.0"
          # requests are REQUIRED for the HPA to compute CPU utilization.
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          # Liveness is intentionally lenient: under heavy CPU load the single
          # worker can be briefly slow to answer. Don't let that restart the pod.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
